<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الصفحة غير موجودة | RawasiShop</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Tajawal', sans-serif; min-height: 100vh; display: grid; place-items: center;
      background: linear-gradient(180deg, #fff5f8 0%, #ffe9f1 100%); color: #3a1f2e; text-align: center; padding: 24px;
    }
    .box { max-width: 480px; }
    .code { font-family: 'El Messiri', sans-serif; font-size: 6rem; font-weight: 700; color: #d6447a; line-height: 1; }
    h1 { font-family: 'El Messiri', sans-serif; font-size: 1.6rem; margin: 8px 0 12px; }
    p { color: #8a6e7c; margin-bottom: 26px; }
    .btn {
      display: inline-block; background: linear-gradient(135deg, #ff7eb0, #d6447a); color: #fff;
      font-weight: 700; padding: 14px 32px; border-radius: 50px; text-decoration: none;
      box-shadow: 0 10px 24px rgba(214,68,122,.35);
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="code">404</div>
    <h1>عذراً، الصفحة غير موجودة</h1>
    <p>يبدو أن الرابط الذي تبحثين عنه غير متاح. عودي إلى الصفحة الرئيسية لاكتشاف عروضنا.</p>
    <a class="btn" href="/">العودة للرئيسية</a>
  </div>
</body>
</html>
