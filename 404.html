  <title>الصفحة غير موجودة | RawasiShop</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#d6447a" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: 'Tajawal', sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(520px 320px at 85% 12%, rgba(255,126,176,.22), transparent 65%),
        radial-gradient(480px 300px at 10% 88%, rgba(231,200,120,.18), transparent 65%),
        linear-gradient(180deg, #fff8fb 0%, #ffe9f1 55%, #fff5f8 100%);
      color: #3a1f2e;
      text-align: center;
      padding: 28px;
    }
    .box {
      max-width: 480px;
      background: rgba(255,255,255,.82);
      border: 1px solid rgba(243,215,225,.7);
      border-radius: 28px;
      padding: 48px 36px;
      box-shadow: 0 12px 28px rgba(58,31,46,.06), 0 28px 64px rgba(178,46,98,.14);
      backdrop-filter: blur(10px);
    }
    .code {
      font-family: 'El Messiri', sans-serif;
      font-size: clamp(4.5rem, 18vw, 6rem);
      font-weight: 700;
      background: linear-gradient(135deg, #ff8fbe 0%, #d6447a 52%, #c4366e 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
      filter: drop-shadow(0 4px 16px rgba(214,68,122,.15));
    }
    h1 {
      font-family: 'El Messiri', sans-serif;
      font-size: clamp(1.35rem, 4vw, 1.65rem);
      margin: 14px 0 14px;
      letter-spacing: -0.01em;
    }
    p {
      color: #8a6e7c;
      margin-bottom: 30px;
      line-height: 1.8;
      font-size: 1.02rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ff8fbe 0%, #d6447a 52%, #c4366e 100%);
      color: #fff;
      font-weight: 700;
      padding: 15px 34px;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 8px 20px rgba(214,68,122,.32), 0 2px 6px rgba(178,46,98,.18);
      transition: transform .35s cubic-bezier(0.22, 1, 0.36, 1), box-shadow .35s ease;
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 32px rgba(214,68,122,.42);
    }
    .btn:active { transform: translateY(-1px); }
    .btn:focus-visible { outline: 2px solid #ff7eb0; outline-offset: 3px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="code">404</div>
    <h1>عذراً، الصفحة غير موجودة</h1>
    <p>يبدو أن الرابط الذي تبحثين عنه غير متاح. عودي إلى الصفحة الرئيسية لاكتشاف عروضنا.</p>
    <a class="btn" href="/">العودة للرئيسية</a>
  </div>
</body>
</html>
