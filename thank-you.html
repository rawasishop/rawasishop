        <li>✔ دفع عند الاستلام</li>
        <li>✔ شحن سريع</li>
        <li>✔ استبدال واسترجاع</li>

  </main>

  <script src="js/config.js"></script>
  <script>
    (function () {
      try { sessionStorage.removeItem('rawasi_cart'); } catch (e) {}
      var p = new URLSearchParams(location.search);
      var order = p.get('order') || '—';
      var total = p.get('total');
      document.getElementById('order-id').textContent = order;
      document.getElementById('order-total').textContent = total ? total + ' ر.س' : '—';

      var wa = document.getElementById('wa-btn');
      var num = (window.RAWASI_CONFIG && window.RAWASI_CONFIG.whatsapp) || '212633405061';
      var msg = 'السلام عليكم، طلبي رقم ' + order + ' من رواسي وأود تأكيده.';
      wa.href = 'https://wa.me/' + num + '?text=' + encodeURIComponent(msg);
    })();
  </script>
